services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: finance
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: api/Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ..:/workspace
      - ~/.bashrc:/root/.bashrc
      - ~/.claude:/root/.claude
      - ~/.config/gh:/root/.config/gh
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://finance:finance@db:5432/finance
    depends_on:
      db:
        condition: service_healthy
    command: sleep infinity

networks:
  default:
    name: finance_aggregator_devnet
    driver: bridge

volumes:
  pgdata:

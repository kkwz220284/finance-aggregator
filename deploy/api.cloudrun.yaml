# Declarative Cloud Run service spec — apply with:
#   gcloud run services replace deploy/api.cloudrun.yaml --region=europe-west2
#
# Replace PROJECT_ID and IMAGE_TAG before applying.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: finance-aggregator-api
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cloudsql-instances: PROJECT_ID:europe-west2:finance-db
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
    spec:
      serviceAccountName: finance-aggregator-sa@PROJECT_ID.iam.gserviceaccount.com
      containers:
        - image: europe-west2-docker.pkg.dev/PROJECT_ID/finance-aggregator/api:IMAGE_TAG
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
          env:
            - name: ENVIRONMENT
              value: cloud
            - name: TRUELAYER_SANDBOX
              value: "false"
            - name: DATABASE_URL
              value: postgresql+asyncpg://finance@/finance?host=/cloudsql/PROJECT_ID:europe-west2:finance-db
            - name: TRUELAYER_CLIENT_ID
              value: YOUR_TRUELAYER_CLIENT_ID
            - name: TRUELAYER_REDIRECT_URI
              value: https://YOUR_DOMAIN/api/v1/auth/truelayer/callback
            - name: FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: fernet-key
                  key: latest
            - name: TRUELAYER_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: truelayer-client-secret
                  key: latest
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-key
                  key: latest
            - name: TRUELAYER_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: truelayer-webhook-secret
                  key: latest
